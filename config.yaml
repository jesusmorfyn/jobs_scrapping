# ==========================================
# CONFIGURACIÓN POR PLATAFORMA (100% Selenium)
# ==========================================
platforms:
  occ:
    enabled: true
    base_url: "https://www.occ.com.mx/empleos/de-{keyword}/tipo-home-office-remoto?tm=7&sort=2"
    pagination:
      param: "page"
      start: 1
      increment: 1
    max_pages: 50
    delay_between_pages: 3
    link_format: "https://www.occ.com.mx/empleo/oferta/{job_id}"
    selenium_rules:
      wait_for_selector: "div[id^='jobcard-']"
      no_results_text: "0 resultados"
      # En OCC, el botón no desaparece, solo se le añade la clase 'pointer-events-none'
      stop_pagination_if_present: "li#btn-next-offer.pointer-events-none" 
    selectors:
      card: "div[id^='jobcard-']"
      job_id: 
        attribute: "id"
        regex: "(\\d+)$"
      title: 
        selector: "h2.text-lg"
      company: 
        selector: "div.flex.flex-row.justify-between.items-center"
        regex: "^([^\\s]+)"
      salary: 
        selector: "span.font-base"

  indeed:
    enabled: true
    base_url: "https://mx.indeed.com/jobs?q={keyword}&sc=0kf%3Aattr%28DSQF7%29%3B&fromage=7"
    pagination:
      param: "start"
      start: 0
      increment: 10
    max_pages: 50
    delay_between_pages: 5
    link_format: "https://mx.indeed.com/viewjob?jk={job_id}"
    selenium_rules:
      wait_for_selector: "#mosaic-provider-jobcards"
      no_results_text: "did not match any jobs"
      # En Indeed, el botón 'siguiente' literalmente desaparece del HTML en la última página
      stop_pagination_if_missing: "a[data-testid='pagination-page-next']"
    selectors:
      card: "div.cardOutline"
      job_id:
        selector: "a[data-jk]"
        attribute: "data-jk"
      title:
        selector: "a[data-jk] span[title], span[id^='jobTitle-']"
      company:
        selector: "span[data-testid='company-name']"
      salary:
        selector: "div[data-testid='salary-snippet-container']"

  linkedin:
    enabled: true
    base_url: "https://www.linkedin.com/jobs/search/?f_WT=2&keywords={keyword}&sortBy=DD&f_TPR=r604800"
    pagination:
      param: "start"
      start: 0
      increment: 25
    max_pages: 50
    delay_between_pages: 5
    link_format: "https://www.linkedin.com/jobs/view/{job_id}/"
    selenium_rules:
      wait_for_selector: "div.jobs-search-results-list, div[data-job-id]"
      scroll_pane_selector: "div.jobs-search-results-list"
      no_results_text: "No matching jobs found"
      # En LinkedIn el botón 'Next' suele desaparecer al final, o estar desactivado.
      stop_pagination_if_missing: "button.jobs-search-pagination__button--next"
      stop_pagination_if_present: "button.jobs-search-pagination__button--next[disabled]"
    selectors:
      card: "div[data-job-id]"
      job_id:
        attribute: "data-job-id"
      title:
        selector: "a.job-card-list__title--link strong, a.job-card-list__title--link"
      company:
        selector: "div.artdeco-entity-lockup__subtitle"
      salary:
        selector: "NONE"