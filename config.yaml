# ==========================================
# CONFIGURACIÓN GENERAL
# ==========================================
general:
  output_filename: "ofertas_trabajo.csv"
  final_columns_to_save:
    - "job_id"
    - "platform"
    - "title"
    - "company"
    - "salary"
    - "link"
    - "timestamp_found"
  headers:
    # OCC usa 'requests' plano, por lo que es vital pasar un User-Agent de un navegador real
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# ==========================================
# CONFIGURACIÓN DE SELENIUM
# ==========================================
selenium:
  # Si corres el script de forma normal en tu PC, usa: "127.0.0.1:9222"
  # Si usas el DevContainer (Docker), usa: "host.docker.internal:9222"
  debugger_address: "192.168.10.235:9223"

# ==========================================
# GESTIÓN DE TIEMPOS (Evitar baneos)
# ==========================================
timing:
  delay_between_keywords: 5  # Segundos de pausa al terminar de buscar una palabra y pasar a la siguiente
  retry_delay: 10            # Segundos a esperar si hay un error de Timeout (principalmente OCC)

# ==========================================
# PALABRAS CLAVE Y FILTROS
# ==========================================
search_filters:
  search_keywords:
    - cloud
  
  # Si pones palabras aquí, SOLO guardará las ofertas que tengan ALGUNA de estas palabras en el título. 
  # Déjalo vacío "[]"" para no filtrar por inclusión estricta.
  include_title_keywords: 
    - aws
    - gcp
    - devops
    - reliability
    - kubernetes
    - docker
    - cloud
    - platform
    - gitlab
  
  # Si el título contiene ALGUNA de estas palabras, la oferta se descarta.
  exclude_title_keywords:
    - SAP
    - data
    - Salesforce
    - Desarroll
    - developer
    - development
    - Software
    - data
    - datos
    - hybrid
    - hibrid
    - biling
    - ingl
    - english





